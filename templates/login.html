{% extends "base.html" %}
{% block title %}Log In — FootyOdds{% endblock %}
{% block content %}
<form method="POST" action="{{ url_for('login') }}">
    <h2 style="margin-bottom:20px;font-size:1.5rem;">Welcome back</h2>
    {% if error %}
    <p class="formError">{{ error }}</p>
    {% endif %}
    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="you@example.com" required>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="••••••••" required>
    <button type="submit" class="signLog">Log in</button>
    <p class="formSwitch">Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a></p>
</form>
{% endblock %}
