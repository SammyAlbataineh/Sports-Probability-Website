{% extends "base.html" %}
{% block title %}Sign Up — FootyOdds{% endblock %}
{% block content %}
<form method="POST" action="{{ url_for('signup') }}">
    <h2 style="margin-bottom:20px;font-size:1.5rem;">Create an account</h2>
    {% if error %}
    <p class="formError">{{ error }}</p>
    {% endif %}
    <label for="username">Username</label>
    <input type="text" id="username" name="username" placeholder="Your name" required>
    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="you@example.com" required>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="••••••••" required>
    <button type="submit" class="signLog">Create account</button>
    <p class="formSwitch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
</form>
{% endblock %}
